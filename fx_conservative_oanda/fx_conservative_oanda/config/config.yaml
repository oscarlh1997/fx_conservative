# Configuración principal
pairs: [EURUSD, GBPUSD, AUDUSD, NZDUSD, USDJPY, USDCHF, USDCAD]

ema_fast: 50
ema_slow: 200
donchian_n: 20
adx_thresh: 20.0
rsi_len: 2
rsi_low: 5.0
rsi_high: 95.0

atr_stop_mult: 1.5
atr_trail_mult: 3.0
tp_R: 2.0

risk_per_trade: 0.0025        # 0.25% del equity/NAV
total_risk_cap: 0.010          # 1.0% máximo en riesgo simultáneo
max_gross_leverage: 2.0        # Notional USD / NAV

correl_window: 90
correl_threshold: 0.80
max_positions: 5

alignment_tz: America/New_York
daily_alignment_hour: 17

# Carpeta de logs y archivos auxiliares
log_dir: logs
state_path: state/state.json
events_file: config/events.csv

# Spread 'teórico' para backtest offline (no aplica a órdenes reales)
spreads:
  EURUSD: 0.00010
  GBPUSD: 0.00012
  AUDUSD: 0.00010
  NZDUSD: 0.00012
  USDJPY: 0.01000
  USDCHF: 0.00012
  USDCAD: 0.00012

# Opcional: sesgo por carry en [-1.0, +1.0] (para backtest)
carry_tilt: {}

# Desactivar aperturas alrededor de eventos macro (leer events.csv)
enable_event_blackout: true
